<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lingo — Translation Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app" id="app">

  <header>
    <div class="brand">
      <div class="brand-mark">🌐</div>
      <div>
        <h1>Lingo</h1>
        <p>Translate anything, instantly.</p>
      </div>
    </div>
    <div class="stat-pills">
      <div class="pill">↔ <b id="statCount">0</b> translations</div>
      <div class="pill">⏱ <b id="statWords">0</b> words</div>
    </div>
  </header>

  <div class="lang-bar" id="langBar">
    <div class="lang-select auto" id="sourceSelect">
      <span class="flag" id="sourceFlag">🌐</span>
      <div class="txt">
        <span class="name" id="sourceName">Detect language</span>
        <span class="sub" id="sourceSub">Auto-detect</span>
      </div>
      <span class="chev">▾</span>
      <div class="lang-dropdown" id="sourceDropdown">
        <div class="dd-search"><input type="text" placeholder="Search language..." id="sourceSearch"></div>
        <div class="dd-list" id="sourceList"></div>
      </div>
    </div>

    <button class="swap-btn" id="swapBtn" title="Swap languages">⇄</button>

    <div class="lang-select" id="targetSelect">
      <span class="flag" id="targetFlag">🇵🇰</span>
      <div class="txt">
        <span class="name" id="targetName">Urdu</span>
        <span class="sub" id="targetSub">اردو</span>
      </div>
      <span class="chev">▾</span>
      <div class="lang-dropdown right" id="targetDropdown">
        <div class="dd-search"><input type="text" placeholder="Search language..." id="targetSearch"></div>
        <div class="dd-list" id="targetList"></div>
      </div>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-head">
        <span class="label">Input</span>
        <div class="icon-row">
          <button class="icon-btn" id="pasteBtn" title="Paste">📋</button>
          <button class="icon-btn" id="clearBtn" title="Clear (Ctrl+K)">✕</button>
        </div>
      </div>
      <textarea id="inputText" placeholder="Type or paste text to translate..." maxlength="2000" spellcheck="true"></textarea>
      <div class="panel-foot">
        <div>
          <div class="char-track"><div class="char-fill" id="charFill"></div></div>
          <div class="char-count"><span id="charNum">0</span> / 2000 · <span id="wordNum">0</span> words</div>
        </div>
        <div class="icon-row">
          <button class="icon-btn" id="micBtn" title="Speak input">🎙</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <span class="label">Translation</span>
        <div class="icon-row">
          <button class="icon-btn" id="speakBtn" title="Listen" disabled>🔊</button>
          <button class="icon-btn" id="copyBtn" title="Copy" disabled>⧉</button>
        </div>
      </div>
      <div id="outputWrap" style="flex:1; display:flex; flex-direction:column;">
        <div class="output-text" id="outputText" contenteditable="false" data-empty="true" data-placeholder="Translation will appear here..."></div>
      </div>
      <div class="alt-chips" id="altChips"></div>
      <div class="panel-foot">
        <span class="char-count" id="detectedInfo">&nbsp;</span>
        <div class="icon-row">
          <button class="icon-btn" id="favBtn" title="Save to favorites" disabled>☆</button>
        </div>
      </div>
    </div>
  </div>

  <div class="actions-bar">
    <button class="translate-btn" id="translateBtn">
      <span id="translateBtnLabel">Translate</span>
      <span class="kbd">⌘⏎</span>
    </button>
  </div>

  <div class="history">
    <h3>🕘 Recent &amp; Favorite Translations</h3>
    <div id="historyBody">
      <div class="history-empty">
        <span class="glyph">🗂️</span>
        No translations yet — your history will show up here.
      </div>
    </div>
  </div>

  <footer>Press <span class="kbd" style="background:rgba(0,0,0,0.06); color:var(--ink-soft);">Ctrl</span>+<span class="kbd" style="background:rgba(0,0,0,0.06); color:var(--ink-soft);">Enter</span> to translate · <span class="kbd" style="background:rgba(0,0,0,0.06); color:var(--ink-soft);">Ctrl</span>+<span class="kbd" style="background:rgba(0,0,0,0.06); color:var(--ink-soft);">K</span> to clear</footer>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/script.js"></script>
</body>
</html>
